name: Daily GitHub Trending

on:
  schedule:
    # UTC 09:17 = 北京时间 17:17，准时调度执行
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-trending-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run daily pipeline
        env:
          SUMMARY_API_KEY: ${{ secrets.SUMMARY_API_KEY }}
          SUMMARY_BASE_URL: ${{ secrets.SUMMARY_BASE_URL }}
          SUMMARY_MODEL: ${{ secrets.SUMMARY_MODEL }}
          SUMMARY_BATCH_SIZE: ${{ secrets.SUMMARY_BATCH_SIZE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: npm run scrape

      - name: Sync to Feishu Base and notify
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          FEISHU_BASE_URL: ${{ secrets.FEISHU_BASE_URL }}
        run: npm run sync:feishu

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "chore(data): update trending data $(date -u +'%Y-%m-%d')"
          git push
