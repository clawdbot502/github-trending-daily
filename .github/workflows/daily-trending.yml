name: Daily GitHub Trending

on:
  schedule:
    # 多重 cron 冗余：fork 仓库 schedule 容易 miss，设置 3 个触发窗口兜底
    # UTC 09:17 / 10:17 / 11:17 = 北京时间 17:17 / 18:17 / 19:17
    - cron: '17 9 * * *'
    - cron: '17 10 * * *'
    - cron: '17 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: daily-trending-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Idempotency check (skip duplicate schedule runs)
        id: check
        run: |
          # 手动触发永远放行
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          TODAY=$(date -u +%Y-%m-%d)
          echo "Checking for successful schedule runs today ($TODAY)..."

          COUNT=$(gh api "repos/${{ github.repository }}/actions/runs?per_page=30" \
            --jq "[.workflow_runs[] | select(.name == \"Daily GitHub Trending\" and .event == \"schedule\" and (.created_at | startswith(\"$TODAY\")) and .conclusion == \"success\")] | length")

          echo "Found $COUNT successful schedule run(s) today."

          if [ "$COUNT" -gt 0 ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scrape:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run daily pipeline
        env:
          SUMMARY_API_KEY: ${{ secrets.SUMMARY_API_KEY }}
          SUMMARY_BASE_URL: ${{ secrets.SUMMARY_BASE_URL }}
          SUMMARY_MODEL: ${{ secrets.SUMMARY_MODEL }}
          SUMMARY_BATCH_SIZE: ${{ secrets.SUMMARY_BATCH_SIZE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: npm run scrape

      - name: Sync to Feishu Base and notify
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BASE_TOKEN: ${{ secrets.FEISHU_BASE_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          FEISHU_BASE_URL: ${{ secrets.FEISHU_BASE_URL }}
        run: npm run sync:feishu

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "chore(data): update trending data $(date -u +'%Y-%m-%d')"
          git push
