name: Daily GitHub Trending

on:
  schedule:
    - cron: '15 1 * * *' # UTC 01:15 = Asia/Hong_Kong 09:15
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-trending-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run daily pipeline
        env:
          SUMMARY_API_KEY: ${{ secrets.SUMMARY_API_KEY }}
          SUMMARY_BASE_URL: ${{ secrets.SUMMARY_BASE_URL }}
          SUMMARY_MODEL: ${{ secrets.SUMMARY_MODEL }}
          SUMMARY_BATCH_SIZE: ${{ secrets.SUMMARY_BATCH_SIZE }}
          # Backward compatibility (kept for emergency rollback)
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
          KIMI_MODEL: ${{ secrets.KIMI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          # Optional: restrict sending to specific chat/thread for security
          REQUIRED_TELEGRAM_CHAT_ID: ${{ secrets.REQUIRED_TELEGRAM_CHAT_ID }}
          REQUIRED_TELEGRAM_THREAD_ID: ${{ secrets.REQUIRED_TELEGRAM_THREAD_ID }}
        run: npm run scrape

      - name: Notify Telegram
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          # Optional: restrict sending to specific chat/thread for security
          REQUIRED_TELEGRAM_CHAT_ID: ${{ secrets.REQUIRED_TELEGRAM_CHAT_ID }}
          REQUIRED_TELEGRAM_THREAD_ID: ${{ secrets.REQUIRED_TELEGRAM_THREAD_ID }}
        run: npm run notify

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "chore(data): update trending data $(date -u +'%Y-%m-%d')"
          git push
